version: '3.8'

# 生产环境 Docker Compose 配置
# 使用方法: docker-compose -f docker-compose.prod.yml up -d

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: high-eq-mysql-prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    # 生产环境不暴露 MySQL 端口到主机
    expose:
      - "3306"
    volumes:
      - mysql_data_prod:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --max_connections=200
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - high-eq-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Spring Boot 后端应用
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: high-eq-backend-prod
    restart: always
    # 配置 DNS 服务器（解决构建时的 DNS 解析问题）
    dns:
      - 8.8.8.8
      - 114.114.114.114
      - 223.5.5.5
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # 数据库配置
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      # JWT 配置
      JWT_SECRET: ${JWT_SECRET}
      # AI 配置
      AI_DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      # CORS 配置
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      # JVM 配置（生产环境优化）
      JAVA_OPTS: "-Xms1g -Xmx2g -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
      # Spring 配置
      SPRING_PROFILES_ACTIVE: prod
    # 生产环境端口配置（可修改为 80 或使用反向代理）
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - high-eq-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

volumes:
  mysql_data_prod:
    driver: local

networks:
  high-eq-network:
    driver: bridge
