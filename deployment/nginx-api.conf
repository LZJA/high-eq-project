# Nginx 配置 - API子域名
# 部署位置: /etc/nginx/conf.d/api.higheq.top.conf

# HTTPS 服务器
server {
    listen 443 ssl http2;
    server_name api.higheq.top;

    # SSL 证书配置（Let's Encrypt - acme.sh）
    ssl_certificate /root/.acme.sh/api.higheq.top_ecc/fullchain.cer;
    ssl_certificate_key /root/.acme.sh/api.higheq.top_ecc/api.higheq.top.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name api.higheq.top;
    return 301 https://$server_name$request_uri;
}
